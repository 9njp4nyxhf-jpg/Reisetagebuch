<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unser Reisetagebuch</title>
    
    <!-- Leaflet CSS für die Karte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #f4f1ea;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* STYLING FÜR DIE TAGEBUCH-SEITE (POPUP) */
        .leaflet-popup-content-wrapper {
            background: #fbf9f5; /* Cremefarbenes Papier */
            border-radius: 8px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.15);
            border-left: 8px solid #d96b43; /* Boho-Orangefarbener Buchrücken */
            padding: 10px;
        }

        .tagebuch-seite {
            font-family: 'Courier New', Courier, monospace; /* Schreibmaschinen- oder Notiz-Look */
            color: #4a3f35;
            max-width: 280px;
        }

        .tagebuch-header {
            font-size: 1.2rem;
            font-weight: bold;
            color: #d96b43;
            margin-bottom: 3px;
            border-bottom: 2px dashed #e0dcd3;
            padding-bottom: 5px;
        }

        .tagebuch-datum {
            font-size: 0.85rem;
            color: #8c7a6b;
            font-style: italic;
            margin-bottom: 12px;
        }

        .tagebuch-text {
            font-size: 0.95rem;
            line-height: 1.5;
            background: linear-gradient(rgba(0,0,0,0) 95%, #e0dcd3 95%);
            background-size: 100% 24px; /* Simuliert linierte Buchseiten */
            padding-bottom: 5px;
            white-space: pre-line;
        }

        .tagebuch-bild {
            width: 100%;
            margin-top: 10px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Leaflet JS für die Karte -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Karte erstellen und auf Skandinavien/Deutschland ausrichten
        const map = L.map('map').setView([54.5, 11.5], 6);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // ==========================================
        // DEIN TAGEBUCH - HIER TRÄGST DU ES EIN!
        // ==========================================
        // Einfach bei aktiv: true eintragen, sobald der Tag gelebt wurde.
        // Bei Coords: [Breitengrad, Längengrad] von Google Maps eintragen.

        const meineReise = [
            {
                aktiv: true,
                tag: "Tag 1",
                datum: "08. Juli 2026",
                ort: "Start zu Hause",
                coords: [52.5200, 13.4050], // Beispiel-Koordinaten
                text: "Wilma ist gepackt, die Vorfreude ist riesig! Heute sind wir endlich losgekommen. Der Motor schnurrt und die erste Etappe liegt hinter uns.",
                bild: "" // Wenn du ein Foto hast, hier den Link rein (z.B. von Imago oder GitHub)
            },
            {
                aktiv: false, // Ändere das im Urlaub auf true, wenn du den Tag einträgst!
                tag: "Tag 2",
                datum: "09. Juli 2026",
                ort: "Noch nicht eingetragen",
                coords: [0, 0],
                text: "HIER DEIN TEXT FÜR TAG 2...",
                bild: ""
            },
            {
                aktiv: false,
                tag: "Tag 3",
                datum: "10. Juli 2026",
                ort: "Noch nicht eingetragen",
                coords: [0, 0],
                text: "HIER DEIN TEXT FÜR TAG 3...",
                bild: ""
            },
            // ... Ich habe die Liste im echten Code für dich kompakt gehalten,
            // du kannst diese Blöcke einfach für jeden Tag kopieren und fortführen!
        ];

        // ==========================================
        // AB HIER RECHNET DER COMPUTER VON SELBST
        // ==========================================
        
        const routenPunkte = [];

        meineReise.forEach(function(eintrag) {
            // Nur anzeigen, wenn der Tag schon "aktiv" geschaltet wurde
            if (eintrag.aktiv && eintrag.coords[0] !== 0) {
                
                routenPunkte.push(eintrag.coords);

                // Das Aussehen der Tagebuchseite zusammenbauen
                let popupInhalt = `
                    <div class="tagebuch-seite">
                        <div class="tagebuch-header">${eintrag.tag}: ${eintrag.ort}</div>
                        <div class="tagebuch-datum">📅 ${eintrag.datum}</div>
                        <div class="tagebuch-text">${eintrag.text}</div>
                `;

                // Falls ein Bild eingetragen wurde, fügen wir es hinzu
                if (eintrag.bild !== "") {
                    popupInhalt += `<img class="tagebuch-bild" src="${eintrag.bild}" />`;
                }

                popupInhalt += `</div>`; // Seite schließen

                // Marker auf die Karte setzen
                L.marker(eintrag.coords).addTo(map)
                    .bindPopup(popupInhalt);
            }
        });

        // Die rote Verbindungslinie zwischen den Punkten zeichnen
        if (routenPunkte.length > 1) {
            L.polyline(routenPunkte, {
                color: '#d96b43',
                weight: 4,
                opacity: 0.7,
                dashArray: '5, 10' // Gestrichelte Linie im Roadtrip-Stil
            }).addTo(map);
        }
    </script>
</body>
</html>
